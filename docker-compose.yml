services:
  postgres:
    image: postgres:15-alpine
    container_name: smartcourse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  redis:
    image: redis:7-alpine
    container_name: smartcourse-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  KAFKA + ZOOKEEPER — Event Streaming
  # ═══════════════════════════════════════════════════════════════

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartcourse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,mntr"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartcourse-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - smartcourse-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: smartcourse-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  TEMPORAL — Workflow Orchestration
  # ═══════════════════════════════════════════════════════════════

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: smartcourse-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - smartcourse-network

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: smartcourse-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - smartcourse-network

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: smartcourse-temporal-admin
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - smartcourse-network
    stdin_open: true
    tty: true

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartcourse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic course.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic enrollment.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic progress.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.events --partitions 1 --replication-factor 1 &&
        echo 'All Kafka topics created.'
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  RABBITMQ — Task Queue Broker
  # ═══════════════════════════════════════════════════════════════

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: smartcourse-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  mongodb:
    image: mongo:7-jammy
    container_name: smartcourse-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: smartcourse-user-service
    # No ports exposed to host — only accessible through API Gateway
    env_file:
      - ./.env
      - ./services/user-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - smartcourse-network

  course-service:
    build:
      context: .
      dockerfile: services/course-service/Dockerfile
    container_name: smartcourse-course-service
    volumes:
      # Mount src for live code changes (avoids rebuild)
      - ./services/course-service/src:/app/src:ro
    # No ports exposed to host — only accessible through API Gateway
    env_file:
      - ./.env
      - ./services/course-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - smartcourse-network

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: smartcourse-notification-service
    # No ports exposed to host — only accessible through API Gateway
    env_file:
      - ./.env
      - ./services/notification-service/.env
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartcourse-network

  core-service:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    container_name: smartcourse-core-service
    env_file:
      - ./.env
      - ./services/core/.env
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartcourse-network

  celery-worker:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: smartcourse-celery-worker
    command: >
      celery -A notification_service.worker:celery_app worker
      --loglevel=info
      -Q email_queue,notification_queue,certificate_queue
    env_file:
      - ./.env
      - ./services/notification-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  AUTH SIDECAR — JWT verification (Python/FastAPI)
  # ═══════════════════════════════════════════════════════════════
  auth-sidecar:
    build:
      context: ./services/api-gateway/auth-sidecar
      dockerfile: Dockerfile
    container_name: smartcourse-auth-sidecar
    # No ports exposed to host — only accessible within Docker network
    env_file:
      - ./.env
      - ./services/api-gateway/auth-sidecar/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  API GATEWAY — Nginx reverse proxy
  # ═══════════════════════════════════════════════════════════════

  api-gateway:
    build:
      context: ./services/api-gateway/nginx
      dockerfile: Dockerfile
    container_name: smartcourse-api-gateway
    ports:
      - "8000:8000"           # The ONLY port clients should access
    depends_on:
      - auth-sidecar
      - user-service
      - course-service
      - notification-service
      - core-service
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - smartcourse-network

networks:
  smartcourse-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  rabbitmq_data:
