services:
  postgres:
    image: postgres:15-alpine
    container_name: smartcourse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  postgres-init-analytics:
    image: postgres:15-alpine
    container_name: smartcourse-postgres-init-analytics
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        psql -h postgres -U ${POSTGRES_USER} -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='analytics_db'" |
        grep -q 1 || psql -h postgres -U ${POSTGRES_USER} -d postgres -c "CREATE DATABASE analytics_db"
    restart: "no"
    networks:
      - smartcourse-network

  redis:
    image: redis:7-alpine
    container_name: smartcourse-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  KAFKA + ZOOKEEPER — Event Streaming
  # ═══════════════════════════════════════════════════════════════

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartcourse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,mntr"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartcourse-kafka
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 && kafka-broker-api-versions --bootstrap-server kafka:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - smartcourse-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: smartcourse-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  TEMPORAL — Workflow Orchestration
  # ═══════════════════════════════════════════════════════════════

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: smartcourse-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./temporal-config:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - smartcourse-network

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: smartcourse-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - smartcourse-network

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: smartcourse-temporal-admin
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - smartcourse-network
    stdin_open: true
    tty: true

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartcourse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic course.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic enrollment.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic progress.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic certificate.events --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.events --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ai.events --partitions 3 --replication-factor 1 &&
        echo 'All Kafka topics created.'
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  RABBITMQ — Task Queue Broker
  # ═══════════════════════════════════════════════════════════════

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: smartcourse-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./monitoring/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  mongodb:
    image: mongo:7-jammy
    container_name: smartcourse-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  QDRANT — Vector Database for RAG
  # ═══════════════════════════════════════════════════════════════

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: smartcourse-qdrant
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC (used by Python SDK for speed)
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - smartcourse-network

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: smartcourse-user-service
    restart: on-failure
    # No ports exposed to host — only accessible through API Gateway
    env_file:
      - ./.env
      - ./services/user-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartcourse-network

  course-service:
    build:
      context: .
      dockerfile: services/course-service/Dockerfile
    container_name: smartcourse-course-service
    restart: on-failure
    volumes:
      # Mount src for live code changes (avoids rebuild)
      - ./services/course-service/src:/app/src:ro
    # No ports exposed to host — only accessible through API Gateway
    env_file:
      - ./.env
      - ./services/course-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartcourse-network

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: smartcourse-notification-service
    restart: on-failure
    # No ports exposed to host — only accessible through API Gateway
    env_file:
      - ./.env
      - ./services/notification-service/.env
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - smartcourse-network

  core-service:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    container_name: smartcourse-core-service
    restart: on-failure
    env_file:
      - ./.env
      - ./services/core/.env
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartcourse-network

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: smartcourse-analytics-service
    restart: on-failure
    volumes:
      - ./services/analytics-service/src:/app/src:ro
    env_file:
      - ./.env
      - ./services/analytics-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init-analytics:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartcourse-network

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: smartcourse-ai-service
    restart: on-failure
    volumes:
      - ./services/ai-service/src:/app/src:ro
    env_file:
      - ./.env
      - ./services/ai-service/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartcourse-network

  celery-worker:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: smartcourse-celery-worker
    restart: on-failure
    command: >
      celery -A notification_service.worker:celery_app worker
      --loglevel=info
      -Q email_queue,notification_queue,certificate_queue
    env_file:
      - ./.env
      - ./services/notification-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  MONITORING — Prometheus + Grafana
  # ═══════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: smartcourse-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartcourse-network

  grafana:
    image: grafana/grafana:10.4.1
    container_name: smartcourse-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: smartcourse
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  OBSERVABILITY — Exporters & Alerting
  # ═══════════════════════════════════════════════════════════════

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: smartcourse-cadvisor
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8085:8080"
    networks:
      - smartcourse-network

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: smartcourse-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - smartcourse-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: smartcourse-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartcourse-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: smartcourse-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smartcourse-network

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: smartcourse-mongodb-exporter
    command:
      - "--mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/admin"
      - "--collect-all"
      - "--compatible-mode"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - smartcourse-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: smartcourse-kafka-exporter
    command:
      - "--kafka.server=kafka:29092"
      - "--topic.filter=.*"
      - "--group.filter=.*"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - smartcourse-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1
    container_name: smartcourse-nginx-exporter
    command:
      - "-nginx.scrape-uri=http://api-gateway:8000/stub_status"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - smartcourse-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: smartcourse-alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  AUTH SIDECAR — JWT verification (Python/FastAPI)
  # ═══════════════════════════════════════════════════════════════
  auth-sidecar:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.sidecar
    container_name: smartcourse-auth-sidecar
    # No ports exposed to host — only accessible within Docker network
    env_file:
      - ./services/api-gateway/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartcourse-network

  # ═══════════════════════════════════════════════════════════════
  #  API GATEWAY — Nginx reverse proxy
  # ═══════════════════════════════════════════════════════════════

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.nginx
    container_name: smartcourse-api-gateway
    ports:
      - "8000:8000"           # The ONLY port clients should access
    depends_on:
      auth-sidecar:
        condition: service_healthy
      user-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      core-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - smartcourse-network

networks:
  smartcourse-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  rabbitmq_data:
  qdrant_data:
  prometheus_data:    # ADD THIS
  grafana_data:       # ADD THIS
